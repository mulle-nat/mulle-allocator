name: MulleSDE

on: [push]

env:
  BUILD_TYPE: release

jobs:
  build:
    runs-on: [ ubuntu-latest, macos-latest ]

    steps:
    - uses: actions/checkout@v2

    - name: Create Build Environment
      run: .github/workflow/install-mulle-sde.sh

    - name: Mulle-SDE Fetch
      shell: bash
      run: mulle-sde fetch 
      
    - name: Mulle-SDE Craft
      shell: bash
      run: mulle-sde test --${BUILD_TYPE}

    - name: Mulle-SDE Test
      shell: bash
      run: mulle-sde test
